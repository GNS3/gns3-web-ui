<header class="header">
  <mat-toolbar class="toolbar-primary">
    <button
      matTooltip="Open menu"
      matTooltipClass="custom-tooltip"
      matTooltipPosition="left"
      mat-icon-button
      class="gns3-button menu-button"
      [matMenuTriggerFor]="mainMenu"
    >
      <mat-icon svgIcon="gns3"></mat-icon>
    </button>

    @if (!recentlyOpenedProjectId && controllerIdProjectList) {
    <button mat-button (click)="listProjects()">Projects</button>
    } @if (recentlyOpenedProjectId && recentlyOpenedcontrollerId) {
    <button mat-button (click)="backToProject()">Back to project</button>
    }

    <span class="spacer"></span>

    <button mat-icon-button [matMenuTriggerFor]="menu">
      <mat-icon>more_vert</mat-icon>
    </button>

    <!-- GNS3 right menu -->
    <mat-menu #menu="matMenu">
      <button mat-menu-item [disabled]="!controllerId" [routerLink]="['controller', controllerId, 'systemstatus']">
        <mat-icon>info</mat-icon>
        <span>System status</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" [routerLink]="['controller', controllerId, 'settings']">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <button
        mat-menu-item
        [disabled]="!controllerId"
        [routerLink]="['controller', controllerId, 'management', 'users']"
      >
        <mat-icon>groups</mat-icon>
        <span>Management</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" [routerLink]="['controller', controllerId, 'help']">
        <mat-icon>help</mat-icon>
        <span>Help</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" [routerLink]="['/controller', controllerId, 'loggeduser']">
        <mat-icon>person</mat-icon>
        <span>User info</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" (click)="goToDocumentation()">
        <mat-icon>person</mat-icon>
        <span>API documentation</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" (click)="logout()">
        <mat-icon>highlight_off</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>

    <!-- GNS3 left menu -->
    <mat-menu #mainMenu="matMenu">
      <button mat-menu-item [routerLink]="['/controllers']">
        <mat-icon>developer_board</mat-icon>
        <span>Controllers</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" [routerLink]="['/controller', controllerId, 'projects']">
        <mat-icon>work</mat-icon>
        <span>Projects</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" [routerLink]="['controller', controllerId, 'preferences']">
        <mat-icon>settings_applications</mat-icon>
        <span>Template preferences</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" [routerLink]="['controller', controllerId, 'computes']">
        <mat-icon>cloud</mat-icon>
        <span>Computes</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" [routerLink]="['controller', controllerId, 'image-manager']">
        <mat-icon>collections</mat-icon>
        <span>Image manager</span>
      </button>
      <button mat-menu-item [disabled]="!controllerId" (click)="addNewTemplate()">
        <mat-icon>control_point</mat-icon>
        <span>New template</span>
      </button>
    </mat-menu>
  </mat-toolbar>
</header>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<app-progress></app-progress>
