<mat-dialog-content class="information-dialog__content">
  <p class="information-dialog__message">{{ confirmationMessage }}</p>
</mat-dialog-content>
<div mat-dialog-actions>
  <button mat-button class="cancel-button" (click)="onNoClick()">No</button>
  <button mat-button class="confirm-button" (click)="onYesClick()" tabindex="2" mat-raised-button color="primary">
    Yes
  </button>
</div>
