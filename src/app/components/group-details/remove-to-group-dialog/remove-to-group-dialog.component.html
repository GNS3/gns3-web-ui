<h2 mat-dialog-title>Remove User</h2>
<mat-dialog-content>
  <p>Are you sure you want to remove <strong>{{ data.name }}</strong> from this group?</p>
</mat-dialog-content>
<div mat-dialog-actions>
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="warn" (click)="onConfirm()">Remove</button>
</div>
