<div class="dialogWrapper" [ngClass]="{ lightTheme: isLightThemeEnabled() }">
  <div class="title">{{ message() }}</div>
  <div class="dialogActions">
    <button mat-button class="cancelBtn" (click)="onNoClick()">No</button>
    <button mat-button class="confirmBtn" (click)="onYesClick()">Yes</button>
  </div>
</div>
