@if (isReady()) {
<header class="group-management__header">
  <h1 class="group-management__title">Groups</h1>
  <div class="group-management__actions">
    <button
      mat-raised-button
      color="primary"
      class="group-management__button"
      [disabled]="selection.selected.length === 0"
      (click)="onDelete(selection.selected)"
    >
      Delete Selected
    </button>
    <button mat-raised-button color="primary" class="group-management__button" (click)="addGroup()">Add Group</button>
  </div>
</header>

<form class="group-management__search-form">
  <mat-form-field class="group-management__search">
    <input
      matInput
      placeholder="Search group by name"
      [(ngModel)]="searchText"
      [ngModelOptions]="{ standalone: true }"
    />
  </mat-form-field>
</form>

<div class="group-management__table-container">
  <table mat-table [dataSource]="dataSource | groupFilter : searchText" matSort #groupsSort="matSort">
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef class="group-management__small-col">
        <mat-checkbox
          (change)="$event ? masterToggle() : null"
          [checked]="selection.hasValue() && isAllSelected()"
          [indeterminate]="selection.hasValue() && !isAllSelected()"
        >
        </mat-checkbox>
      </th>
      <td mat-cell *matCellDef="let row" class="group-management__small-col">
        <mat-checkbox
          (click)="$event.stopPropagation()"
          (change)="$event ? selection.toggle(row) : null"
          [checked]="selection.isSelected(row)"
        >
        </mat-checkbox>
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let element">
        <a
          class="group-management__link"
          [routerLink]="['/controller', controller.id, 'management/groups', element.user_group_id]"
        >
          {{ element.name }}
        </a>
      </td>
    </ng-container>

    <ng-container matColumnDef="created_at">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Creation date</th>
      <td mat-cell *matCellDef="let element">{{ element.created_at }}</td>
    </ng-container>

    <ng-container matColumnDef="updated_at">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Last update</th>
      <td mat-cell *matCellDef="let element">{{ element.updated_at }}</td>
    </ng-container>

    <ng-container matColumnDef="is_builtin">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Built-in</th>
      <td mat-cell *matCellDef="let element">{{ element.is_builtin }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
  </table>

  <mat-paginator
    #groupsPaginator="matPaginator"
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
    aria-label="Select page"
  >
  </mat-paginator>
</div>
} @else {
<div class="group-management__loader">
  <mat-spinner class="group-management__spinner"></mat-spinner>
</div>
}
