<div *ngIf="!isInstallAppliance">
  <div class="row">
    <div class="col-md-10">
      <h5>Would you like to automatically install appliances for this image?</h5>
    </div>
    <div class="col-md-2 txt-align">
      <button mat-button (click)="closeDialog()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <div mat-dialog-content>
    <mat-radio-group
      name="install_appliances"
      class="choose-instal-appliance"
      [value]="install_appliance"
      (change)="selectInstallApplianceOption($event)"
    >
      <mat-radio-button [value]="true" class="instal-appliances-button" [checked]="install_appliance">
        Yes
      </mat-radio-button>
      <mat-radio-button [value]="false" class="instal-appliances-button" [checked]="!install_appliance">
        No
      </mat-radio-button>
    </mat-radio-group>
  </div>
  <div mat-dialog-actions align="end">
    <button mat-raised-button color="primary" (click)="isInstallAppliance = !isInstallAppliance">Next</button>
  </div>
</div>

<div *ngIf="isInstallAppliance">
  <div class="row" style="display: flex">
    <div class="col-md-6">
      <h5 *ngIf="uploaderImage.queue.length <= 0">Please Select image</h5>
      <p *ngIf="uploaderImage.queue.length > 0" class="uploaded-text">Upload queue</p>
    </div>
    <div class="col-md-4 txt-align" *ngIf="uploaderImage.queue.length <= 0">
      <input
        type="file"
        accept=".bin,.image,.iol,.qcow2,.vmdk"
        multiple
        #file
        class="non-visible"
        ng2FileSelect
        [uploader]="uploaderImage"
        (onFileSelected)="uploadImageFile()"
      />
      <button mat-raised-button color="primary" (click)="file.click()" class="file-button">Browse</button>
    </div>
    <div class="{{uploaderImage.queue.length > 0 ? 'col-md-6 txt-align' : 'col-md-2 txt-align'}}  ">
      <button mat-button (click)="closeDialog()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>


  <div class="row" *ngFor="let img of uploaderImage.queue; let i = index">
    <div class="col-md-6">
      <mat-title [ngClass]="{ 'uploaded-error-text': img.isError }">
        {{ i + 1 }}. {{ img.file.name }}
      </mat-title>
    </div>
    <div class="col-md-4">
      <mat-progress-bar
        mode="determinate"
        [value]="getUploadState(img).progress"
        aria-valuemin="0"
        aria-valuemax="100"
      ></mat-progress-bar>
    </div>
    <div class="col-md-2">
      <span class="upload-state" [ngClass]="{ 'uploaded-error-text': getUploadState(img).status === 'error' }">
        {{ getUploadState(img).progress }}%
        <span *ngIf="getUploadState(img).status === 'uploaded'">done</span>
        <span *ngIf="getUploadState(img).status === 'error'">error</span>
        <span *ngIf="getUploadState(img).status === 'uploading'">uploading</span>
      </span>
    </div>
  </div>
  <div mat-dialog-actions align="end" *ngIf="uploaderImage.queue.length > 0">
    <button
      mat-raised-button
      color="primary"
      (click)="uploaderImage.queue.length > 0 && hasActiveUploads() ? cancelUploading() : closeDialog()"
    >
      {{ hasActiveUploads() ? 'Cancel uploads' : 'Close' }}
    </button>
  </div>
</div>
