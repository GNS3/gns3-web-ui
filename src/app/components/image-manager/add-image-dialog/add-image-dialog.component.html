@if (!isInstallAppliance) {
<h1 mat-dialog-title>
  Would you like to automatically install appliances for this image?
</h1>

<mat-dialog-content>
  <mat-radio-group
    name="install_appliances"
    [value]="install_appliance"
    (change)="selectInstallApplianceOption($event)"
  >
    <mat-radio-button [value]="true" [checked]="install_appliance"> Yes </mat-radio-button>
    <mat-radio-button [value]="false" [checked]="!install_appliance"> No </mat-radio-button>
  </mat-radio-group>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="closeDialog()">Cancel</button>
  <button mat-raised-button color="primary" (click)="isInstallAppliance = !isInstallAppliance">Next</button>
</mat-dialog-actions>
} @if (isInstallAppliance) {
<h1 mat-dialog-title>Select image file(s) to upload</h1>

<mat-dialog-content>
  <p class="add-image-dialog-hint">
    <mat-icon class="add-image-dialog-hint-icon">info_outline</mat-icon>
    Uploads run in the background — you can navigate away freely.
  </p>
  <input
    type="file"
    accept=".bin,.image,.iol,.qcow2,.vmdk"
    multiple
    #fileInput
    class="add-image-dialog-file-input"
    (change)="onFilesSelected($event)"
  />
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="isInstallAppliance = false">Back</button>
  <button mat-raised-button color="primary" (click)="fileInput.click()">Browse</button>
</mat-dialog-actions>
}
