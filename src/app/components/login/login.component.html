<div class="login-wrapper">
  <div class="login-card">
    <mat-card class="login-card__mat-card">
      <!-- Header with Logo and Version -->
      <div class="login-card__header">
        <div class="login-card__logo">
          <mat-icon class="login-card__icon" *ngIf="!isLightThemeEnabled()" svgIcon="gns3"></mat-icon>
          <mat-icon class="login-card__icon" *ngIf="isLightThemeEnabled()" svgIcon="gns3black"></mat-icon>
          <div class="login-card__title">
            <h1>GNS3</h1>
            <h6>v{{ version() }}</h6>
          </div>
        </div>
      </div>

      <!-- Controller Information -->
      @if (controllerName) {
        <div class="login-card__controller-info">
          <mat-icon class="login-card__controller-icon">storage</mat-icon>
          <div class="login-card__controller-details">
            <span class="login-card__controller-name">{{ controllerName }}</span>
            <span class="login-card__controller-address">{{ controllerAddress }}</span>
          </div>
        </div>
      }

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-card__form">
        <!-- Username Field -->
        <mat-form-field class="login-card__form-field">
          <mat-icon matPrefix class="login-card__field-icon">person</mat-icon>
          <input
            matInput
            formControlName="username"
            placeholder="Username"
            [autofocus]="!isRememberMeChecked()"
          />
          <mat-error *ngIf="loginForm.controls.username.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <!-- Password Field -->
        <mat-form-field class="login-card__form-field">
          <mat-icon matPrefix class="login-card__field-icon">lock</mat-icon>
          <input
            matInput
            [type]="hidePassword() ? 'password' : 'text'"
            formControlName="password"
            placeholder="Password"
            (keyup)="onCapsLock($event)"
          />
          <mat-icon
            matSuffix
            class="login-card__visibility-icon"
            (click)="togglePasswordVisibility()"
          >
            {{ hidePassword() ? 'visibility_off' : 'visibility' }}
          </mat-icon>
          <mat-error *ngIf="loginForm.controls.password.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <!-- Caps Lock Warning -->
        @if (isCapsLockOn()) {
          <div class="login-card__caps-lock-warning">
            <mat-icon class="login-card__warning-icon">warning</mat-icon>
            <span>Caps Lock is on</span>
          </div>
        }

        <!-- Remember Me Checkbox -->
        <div class="login-card__checkbox">
          <mat-checkbox
            [checked]="isRememberMeChecked()"
            color="primary"
            (change)="onRememberMeChange($event.checked)"
          >
            Remember me
          </mat-checkbox>
        </div>

        <!-- Submit Button -->
        <div class="login-card__actions">
          <button
            type="submit"
            class="login-card__submit-btn"
            mat-raised-button
            color="primary"
            [disabled]="isLoading()"
          >
            @if (isLoading()) {
              <mat-progress-spinner
                diameter="20"
                mode="indeterminate"
                class="login-card__spinner"
              ></mat-progress-spinner>
            } @else {
              <span>Login</span>
            }
          </button>
        </div>
      </form>
    </mat-card>
  </div>
</div>
