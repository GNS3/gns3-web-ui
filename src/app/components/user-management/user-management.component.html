@if (isReady) {
<header class="user-management__header">
  <h1 class="user-management__title">Users</h1>
  <div class="user-management__actions">
    <button
      mat-raised-button
      color="primary"
      class="user-management__button"
      [disabled]="selection.selected.length === 0"
      (click)="deleteMultiple()"
    >
      Delete Users
    </button>
    <button mat-raised-button color="primary" class="user-management__button" (click)="addUser()">Add User</button>
  </div>
</header>

<form class="user-management__search-form">
  <mat-form-field class="user-management__search">
    <input
      matInput
      placeholder="Search by username, full name or email"
      [value]="searchText()"
      (input)="searchText.set($event.target.value)"
    />
  </mat-form-field>
</form>

<div class="user-management__table-container">
  <mat-table [dataSource]="dataSource | userFilter : searchText()" matSort #usersSort="matSort">
    <ng-container matColumnDef="select">
      <mat-header-cell *matHeaderCellDef class="user-management__small-col">
        <mat-checkbox
          (change)="$event ? masterToggle() : null"
          [checked]="selection.hasValue() && isAllSelected()"
          [indeterminate]="selection.hasValue() && !isAllSelected()"
        >
        </mat-checkbox>
      </mat-header-cell>
      <mat-cell *matCellDef="let row" class="user-management__small-col">
        <mat-checkbox
          (click)="$event.stopPropagation()"
          (change)="$event ? selection.toggle(row) : null"
          [checked]="selection.isSelected(row)"
        >
        </mat-checkbox>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="username">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Username</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <span
          class="user-management__username user-management__username--clickable"
          (click)="openUserDetailDialog(row)"
          >{{ row.username }}</span
        >
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="full_name">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Full Name</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <span class="user-management__overflow-text">{{ row.full_name }}</span>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="email">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Mail</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <span class="user-management__overflow-text">{{ row.email }}</span>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="is_active">
      <mat-header-cell *matHeaderCellDef mat-sort-header class="user-management__active-col">Active</mat-header-cell>
      <mat-cell *matCellDef="let row" class="user-management__active-col">{{ row.is_active }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="last_login">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Last Login</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <span class="user-management__overflow-text">{{ row.last_login }}</span>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="updated_at">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Last Update</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <span class="user-management__overflow-text">{{ row.updated_at ? row.updated_at : row.created_at }}</span>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
      <mat-cell *matCellDef="let row" class="user-management__actions-cell">
        <button mat-icon-button (click)="openUserDetailDialog(row)" matTooltip="Edit user">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="openAiProfileDialog(row)" matTooltip="AI Profiles">
          <mat-icon>psychology</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
  </mat-table>

  <mat-paginator
    #usersPaginator="matPaginator"
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
    aria-label="Select page"
  >
  </mat-paginator>
</div>
} @else {
<div class="user-management__loader">
  <mat-spinner class="user-management__spinner"></mat-spinner>
</div>
}
