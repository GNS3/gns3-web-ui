<mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
<nav mat-tab-nav-bar [tabPanel]="tabPanel">
  @for (link of links(); track link) {
    <a mat-tab-link
       routerLink="./{{link}}"
       routerLinkActive
       #rla="routerLinkActive">
      {{link.charAt(0).toUpperCase() + link.slice(1)}}
    </a>
  }
</nav>
<router-outlet></router-outlet>
