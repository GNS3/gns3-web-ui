<div class="progress-ring">
  <svg
    class="progress-ring__svg"
    [attr.viewBox]="'0 0 ' + (radius() * 2 + strokeWidth()) + ' ' + (radius() * 2 + strokeWidth())"
  >
    <!-- Track (background circle) -->
    <circle
      class="progress-ring__track"
      [attr.cx]="radius() + strokeWidth() / 2"
      [attr.cy]="radius() + strokeWidth() / 2"
      [attr.r]="radius()"
      [attr.stroke-width]="strokeWidth()"
      [style.stroke]="trackColor()"
    />
    <!-- Progress circle -->
    <circle
      class="progress-ring__circle"
      [attr.cx]="radius() + strokeWidth() / 2"
      [attr.cy]="radius() + strokeWidth() / 2"
      [attr.r]="radius()"
      [attr.stroke-width]="strokeWidth()"
      [style.stroke]="computedColor"
      [style.stroke-dasharray]="strokeDasharray"
      [style.stroke-dashoffset]="strokeDashoffset"
    />
  </svg>
  <div class="progress-ring__content">
    <span class="progress-ring__percent">{{ percent() || 0 }}%</span>
    @if (label()) {
    <span class="progress-ring__label">{{ label() }}</span>
    }
  </div>
</div>
