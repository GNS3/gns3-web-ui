@if (isDraggingEnabled) {
<div (document:mousemove)="dragWidget($event)" (document:mouseup)="toggleDragging(false)"></div>
}
<!-- Option with resizing -->
<div
  class="consoleWrapper"
  [ngClass]="{
    lightTheme: isLightThemeEnabled,
    'console-active': isConsoleActive,
    'is-minimized': isMinimized
  }"
  [ngStyle]="style"
  mwlResizable
  [validateResize]="validate"
  [enableGhostResize]="true"
  (resizeStart)="toggleDragging(false)"
  (resizeEnd)="onResizeEnd($event)"
  tabindex="0"
  (click)="onConsoleActivate()"
  (focus)="onConsoleActivate()"
>
  <div
    class="resize-handle resize-handle-top"
    mwlResizeHandle
    [resizeEdges]="{ top: true }"
    [hidden]="isMinimized"
  ></div>
  <div
    class="resize-handle resize-handle-right"
    mwlResizeHandle
    [resizeEdges]="{ right: true }"
    [hidden]="isMinimized"
  ></div>
  <div
    class="resize-handle resize-handle-bottom"
    mwlResizeHandle
    [resizeEdges]="{ bottom: true }"
    [hidden]="isMinimized"
  ></div>
  <div
    class="resize-handle resize-handle-left"
    mwlResizeHandle
    [resizeEdges]="{ left: true }"
    [hidden]="isMinimized"
  ></div>

  <!-- Taskbar Icon Mode (shown when minimized, click anywhere to restore) -->
  <div class="taskbar-icon" [hidden]="!isMinimized" (click)="minimize(false)" title="Click to restore">
    <mat-icon class="taskbar-icon__icon">terminal</mat-icon>
    <span class="taskbar-icon__label">{{ getActiveTabName() }}</span>
  </div>

  <!-- Normal Mode (hidden when minimized) -->
  <div class="console-content" [hidden]="isMinimized">
    <!-- Devices Panel -->
    <app-console-devices-panel
      [isLightTheme]="isLightThemeEnabled"
      (deviceSelected)="onDeviceSelected($event)"
    ></app-console-devices-panel>

    <!-- Console Area -->
    <div class="console-area">
      <div
        class="consoleHeader"
        [ngClass]="{ lightThemeConsoleHeader: isLightThemeEnabled }"
        (mousedown)="toggleDragging(true)"
      >
        <mat-tab-group
          class="console-wrapper__tabs"
          [selectedIndex]="selected.value"
          (selectedIndexChange)="selected.setValue($event)"
        >
          @for (node of nodes; track $index; let index = $index) {
          <mat-tab [label]="tab">
            <ng-template mat-tab-label>
              <span class="tab-label-text">{{ node.name }}</span>
              <button mat-icon-button (mousedown)="$event.stopPropagation()" (click)="removeTab(index)">
                <mat-icon>close</mat-icon>
              </button>
            </ng-template>
          </mat-tab>
          }

          <mat-tab>
            <ng-template mat-tab-label>
              <span class="tab-label-text">GNS3 console</span>
            </ng-template>
          </mat-tab>
        </mat-tab-group>

        <div class="console-header-actions">
          @if (!isMaximized) {
          <button
            mat-icon-button
            (mousedown)="$event.stopPropagation()"
            (click)="toggleMaximize()"
            title="Maximize height"
          >
            <mat-icon>fullscreen</mat-icon>
          </button>
          } @if (isMaximized) {
          <button mat-icon-button (mousedown)="$event.stopPropagation()" (click)="toggleMaximize()" title="Restore">
            <mat-icon>fullscreen_exit</mat-icon>
          </button>
          }
          <button mat-icon-button (mousedown)="$event.stopPropagation()" (click)="minimize(true)">
            <mat-icon>remove</mat-icon>
          </button>
          <button mat-icon-button (mousedown)="$event.stopPropagation()" (click)="close()">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>

      <app-log-console [hidden]="!(selected.value === nodes.length)" [controller]="controller()" [project]="project()">
      </app-log-console>

      @for (node of nodes; track $index; let index = $index) {
      <app-web-console [hidden]="!(selected.value === index)" [controller]="controller()" [node]="nodes[index]">
      </app-web-console>
      }
    </div>
  </div>
</div>
