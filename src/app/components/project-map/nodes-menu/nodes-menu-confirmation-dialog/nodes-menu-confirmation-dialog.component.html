<h2 mat-dialog-title class="nodes-menu-confirmation-dialog__title">Confirm {{ confirmActionData.actionType }} All</h2>
<mat-divider></mat-divider>
<mat-dialog-content class="nodes-menu-confirmation-dialog__content">
  Are you sure you want to {{ confirmActionData.actionType }} all devices?
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>No</button>
  <button mat-button (click)="confirmAction()" cdkFocusInitial>Yes</button>
</mat-dialog-actions>
