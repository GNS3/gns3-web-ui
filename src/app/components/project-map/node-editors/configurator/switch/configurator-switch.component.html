<h1 mat-dialog-title>Configurator for Frame-Relay switch {{ name }}</h1>

<div class="modal-form-container">
  <div class="content">
    <div class="default-content">
      <mat-card>
        <div class="form-container">
          <mat-form-field class="form-field">
            <mat-label>Name</mat-label>
            <input matInput type="text" [value]="nodeName()" (input)="nodeName.set($event.target.value)" />
          </mat-form-field>
        </div>

        <div class="fr-switch__input-grid">
          <mat-form-field class="form-field">
            <mat-label>Source Port</mat-label>
            <input matInput type="text" [value]="sourcePort()" (input)="sourcePort.set($event.target.value)" />
          </mat-form-field>
          <mat-form-field class="form-field">
            <mat-label>Destination Port</mat-label>
            <input matInput type="text" [value]="destinationPort()" (input)="destinationPort.set($event.target.value)" />
          </mat-form-field>
          <mat-form-field class="form-field">
            <mat-label>Source DLCI</mat-label>
            <input matInput type="text" [value]="sourceDlci()" (input)="sourceDlci.set($event.target.value)" />
          </mat-form-field>
          <mat-form-field class="form-field">
            <mat-label>Destination DLCI</mat-label>
            <input matInput type="text" [value]="destinationDlci()" (input)="destinationDlci.set($event.target.value)" />
          </mat-form-field>
        </div>

        <div class="fr-switch__add-btn">
          <button mat-button (click)="add()">Add</button>
        </div>

        <table mat-table [dataSource]="nodeMappingsDataSource">
          <ng-container matColumnDef="portIn">
            <th mat-header-cell *matHeaderCellDef>Source Port : DLCI</th>
            <td mat-cell *matCellDef="let element">{{ element.portIn }}</td>
          </ng-container>

          <ng-container matColumnDef="portOut">
            <th mat-header-cell *matHeaderCellDef>Destination Port : DLCI</th>
            <td mat-cell *matCellDef="let element">{{ element.portOut }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button matTooltip="Delete mapping" matTooltipClass="custom-tooltip" (click)="delete(element)">
                <mat-icon aria-label="Delete mapping">delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </mat-card>
    </div>
  </div>
</div>

<div mat-dialog-actions>
  <button mat-button (click)="onCancelClick()" color="accent">Cancel</button>
  <button mat-button (click)="onSaveClick()" tabindex="2" mat-raised-button color="primary">Apply</button>
</div>
