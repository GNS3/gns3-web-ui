<h1 mat-dialog-title>Configurator for ATM switch {{ name }}</h1>

<div class="modal-form-container">
  <div class="content">
    <div class="default-content">
      <mat-card>
        <form [formGroup]="nameForm">
          <mat-form-field class="form-field">
            <mat-label>Name</mat-label>
            <input matInput type="text" formControlName="name" />
          </mat-form-field>
          <mat-checkbox formControlName="useVpiOnly"> Use VPI only (VP tunnel) </mat-checkbox>
        </form>

        <form [formGroup]="inputForm">
          <div class="atm-switch__input-grid">
            <mat-form-field class="form-field">
              <mat-label>Source Port</mat-label>
              <input matInput type="number" min="0" formControlName="sourcePort" />
            </mat-form-field>
            <mat-form-field class="form-field">
              <mat-label>Destination Port</mat-label>
              <input matInput type="number" min="0" formControlName="destinationPort" />
            </mat-form-field>
          </div>
        </form>

        <form [formGroup]="inputForm">
          <div class="atm-switch__input-grid">
            <mat-form-field class="form-field">
              <mat-label>Source VCI</mat-label>
              <input matInput type="number" min="1" formControlName="sourceVci" />
            </mat-form-field>
            <mat-form-field class="form-field">
              <mat-label>Destination VCI</mat-label>
              <input matInput type="number" min="1" formControlName="destinationVci" />
            </mat-form-field>
          </div>
        </form>

        <form [formGroup]="abstractForm">
          <div class="atm-switch__input-grid">
            <mat-form-field class="form-field">
              <mat-label>Source VPI</mat-label>
              <input matInput type="number" min="1" formControlName="sourceVpi" />
            </mat-form-field>
            <mat-form-field class="form-field">
              <mat-label>Destination VPI</mat-label>
              <input matInput type="number" min="1" formControlName="destinationVpi" />
            </mat-form-field>
          </div>
        </form>

        <div class="atm-switch__add-btn">
          <button mat-button (click)="add()">Add</button>
        </div>

        <table mat-table [dataSource]="nodeMappingsDataSource">
          <ng-container matColumnDef="portIn">
            <th mat-header-cell *matHeaderCellDef>Source Port : VPI : VCI</th>
            <td mat-cell *matCellDef="let element">{{ element.portIn }}</td>
          </ng-container>

          <ng-container matColumnDef="portOut">
            <th mat-header-cell *matHeaderCellDef>Destination Port : VPI : VCI</th>
            <td mat-cell *matCellDef="let element">{{ element.portOut }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button matTooltip="Delete mapping" matTooltipClass="custom-tooltip" (click)="delete(element)">
                <mat-icon aria-label="Delete mapping">delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </mat-card>
    </div>
  </div>
</div>

<div mat-dialog-actions>
  <button mat-button (click)="onCancelClick()" color="accent">Cancel</button>
  <button mat-button (click)="onSaveClick()" tabindex="2" mat-raised-button color="primary">Apply</button>
</div>
