@if (project) {
<div class="project-map">
  <!-- Project Titlebar -->
  <app-project-titlebar
    [project]="project"
    [controller]="controller"
    [readonly]="inReadOnlyMode"
    [toolsDrawLink]="tools.draw_link"
    [toolsMoving]="tools.moving"
    [isTopologySummaryVisible]="isTopologySummaryVisible"
    [isInterfaceLabelVisible]="isInterfaceLabelVisible"
    [isConsoleVisible]="isConsoleVisible"
    [notificationsVisibility]="notificationsVisibility"
    [layersVisibility]="layersVisibility"
    [gridVisibility]="gridVisibility"
    [symbolScaling]="symbolScaling"
    (toggleDrawLine)="toggleDrawLineMode()"
    (toggleMovingMode)="toggleMovingMode()"
    (toggleTopologySummary)="toggleShowTopologySummary($event)"
    (toggleShowInterfaceLabels)="toggleShowInterfaceLabels($event)"
    (toggleShowConsole)="toggleShowConsole($event)"
    (toggleNotifications)="toggleNotifications($event)"
    (toggleLayers)="toggleLayers($event)"
    (toggleGrid)="toggleGrid($event)"
    (toggleSnapToGrid)="toggleSnapToGrid($event)"
    (toggleSymbolScaling)="toggleSymbolScaling($event)"
    (onNodeCreation)="onNodeCreation($event)"
  >
  </app-project-titlebar>

  <!-- Context Menu for right-click on map -->
  <app-context-menu [project]="project" [controller]="controller"></app-context-menu>

  @if (!settings.angular_map) {
  <app-d3-map
    [controller]="controller"
    [project]="project"
    [symbols]="symbols"
    [nodes]="nodes()"
    [links]="links"
    [drawings]="drawings"
    [width]="project.scene_width"
    [height]="project.scene_height"
    [show-interface-labels]="isInterfaceLabelVisible"
    [readonly]="inReadOnlyMode"
    (nodeDragged)="onNodeDragged($event)"
    (drawingDragged)="onDrawingDragged($event)"
    (onLinkCreated)="onLinkCreated($event)"
    (onDrawingResized)="onDrawingResized($event)"
  >
  </app-d3-map>
  } @if (settings.angular_map) {
  <app-experimental-map
    [symbols]="symbols"
    [nodes]="nodes()"
    [links]="links"
    [drawings]="drawings"
    [width]="project.scene_width"
    [height]="project.scene_height"
    [show-interface-labels]="isInterfaceLabelVisible"
    [selection-tool]="tools.selection"
    [moving-tool]="tools.moving"
    [draw-link-tool]="tools.draw_link"
    [readonly]="inReadOnlyMode"
  >
  </app-experimental-map>
  }

  <!-- Project toolbar -->
  <div id="project-toolbar">
    <div class="section">
      <button
        matTooltip="Selection mode"
        matTooltipClass="custom-tooltip"
        matTooltipPosition="left"
        mat-icon-button
        class="selection-button menu-button"
        [color]="tools.moving ? 'basic' : 'primary'"
        (click)="toggleMovingMode()"
      >
        <mat-icon>near_me</mat-icon>
      </button>
      <button
        matTooltip="Pan workspace"
        matTooltipClass="custom-tooltip"
        matTooltipPosition="left"
        class="pan-button menu-button"
        mat-icon-button
        [color]="tools.moving ? 'primary' : 'basic'"
        (click)="toggleMovingMode()"
      >
        <mat-icon>zoom_out_map</mat-icon>
      </button>
      <button
        matTooltip="Zoom in"
        matTooltipClass="custom-tooltip"
        matTooltipPosition="left"
        class="zoom-button"
        mat-icon-button
        (click)="zoomIn()"
      >
        <mat-icon>zoom_in</mat-icon>
      </button>
      <button
        matTooltip="Reset zoom"
        matTooltipClass="custom-tooltip"
        matTooltipPosition="left"
        class="reset-zoom-button"
        mat-icon-button
        (click)="resetZoom()"
      >
        <mat-icon>adjust</mat-icon>
      </button>
      <button
        matTooltip="Zoom out"
        matTooltipClass="custom-tooltip"
        matTooltipPosition="left"
        class="zoom-button"
        mat-icon-button
        (click)="zoomOut()"
      >
        <mat-icon>zoom_out</mat-icon>
      </button>
    </div>
    <div class="section">
      <app-project-map-menu
        [controller]="controller"
        [project]="project"
        (aiChatOpened)="onAIChatOpened()"
      ></app-project-map-menu>
    </div>
    @if (!readonly) {
    <div class="section">
      <app-snapshot-menu-item [controller]="controller" [project]="project"> </app-snapshot-menu-item>
    </div>
    }
  </div>

  <app-progress></app-progress>
  @if (tools.draw_link) {
  <app-draw-link-tool [links]="links"></app-draw-link-tool>
  }
  <app-drawing-dragged [controller]="controller" [project]="project"></app-drawing-dragged>
  <app-drawing-resized [controller]="controller"></app-drawing-resized>
  <app-interface-label-dragged [controller]="controller"></app-interface-label-dragged>
  <app-link-created [controller]="controller" [project]="project"></app-link-created>
  <app-node-dragged [controller]="controller" [project]="project"></app-node-dragged>
  <app-node-label-dragged [controller]="controller"></app-node-label-dragged>
  <app-text-added [controller]="controller" [project]="project" (drawingSaved)="onDrawingSaved()"> </app-text-added>
  <app-text-edited [controller]="controller"></app-text-edited>
  <div [ngClass]="{ visible: !isConsoleVisible }">
    @if (project) {
    <app-console-wrapper
      [controller]="controller"
      [project]="project"
      (closeConsole)="toggleShowConsole($event)"
      (deviceSelected)="onDeviceSelected($event)"
      (consoleDeactivated)="clearConsoleHighlight()"
    ></app-console-wrapper>
    }
  </div>

  <!-- AI Chat Panel -->
  @if (project && isAIChatVisible) {
  <app-ai-chat [project]="project" [controller]="controller" (closed)="closeAIChat()"> </app-ai-chat>
  }
</div>
}

<ng-template #topologySummaryContainer></ng-template>
