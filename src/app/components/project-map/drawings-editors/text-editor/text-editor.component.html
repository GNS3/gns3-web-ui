<h1 mat-dialog-title>Text editor</h1>

<div class="modal-form-container">
  <mat-form-field class="form-field">
    <mat-label>Fill color</mat-label>
    <input matInput type="color" [value]="element.fill" (input)="changeTextColor($event.target.value)" />
  </mat-form-field>

  <form [formGroup]="formGroup">
    <mat-form-field class="form-field">
      <mat-label>Rotation</mat-label>
      <input formControlName="rotation" matInput type="text" />
    </mat-form-field>
  </form>

  <textarea #textArea id="textArea" class="text" [value]="element.text" (input)="onTextChange($event.target.value)" [readonly]="!isTextEditable"></textarea>
</div>

<div mat-dialog-actions>
  <button mat-button (click)="onNoClick()" color="accent">Cancel</button>
  <button mat-button (click)="onYesClick()" tabindex="2" mat-raised-button color="primary">Apply</button>
</div>
