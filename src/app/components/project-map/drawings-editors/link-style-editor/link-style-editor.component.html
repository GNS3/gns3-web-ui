<h1 mat-dialog-title>Link Style Editor</h1>

<div class="modal-form-container">
  <form [formGroup]="formGroup">
    <mat-form-field class="form-field">
      <mat-label>Color</mat-label>
      <input matInput formControlName="color" type="color" />
    </mat-form-field>

    <mat-form-field class="form-field">
      <mat-label>Width</mat-label>
      <input matInput formControlName="width" type="number" />
    </mat-form-field>

    <mat-form-field class="form-field">
      <mat-label>Line style</mat-label>
      <mat-select formControlName="type">
        @for (type of borderTypes; track type) {
          <mat-option [value]="type">{{ type }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field class="form-field">
      <mat-label>Link type</mat-label>
      <mat-select formControlName="linkType">
        @for (linkType of linkTypes; track linkType) {
          <mat-option [value]="linkType">{{ linkType }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    @if (isCurvinessSelected()) {
      <mat-form-field class="form-field bezier-curviness-field">
        <mat-label>Curviness</mat-label>
        <input
          matInput
          formControlName="bezierCurviness"
          type="number"
          [min]="curvinessMin"
          [max]="curvinessMax"
          [step]="curvinessStep"
        />
      </mat-form-field>
    }

    @if (isFlowchartSelected()) {
      <mat-form-field class="form-field flowchart-roundness-field">
        <mat-label>Roundness</mat-label>
        <input
          matInput
          formControlName="flowchartRoundness"
          type="number"
          [min]="flowchartRoundnessMin"
          [max]="flowchartRoundnessMax"
          [step]="flowchartRoundnessStep"
        />
      </mat-form-field>
    }
  </form>
</div>

<div mat-dialog-actions>
  <button mat-button (click)="onNoClick()" color="accent">Cancel</button>
  <button mat-button (click)="onYesClick()" tabindex="2" mat-raised-button color="primary">Apply</button>
</div>
