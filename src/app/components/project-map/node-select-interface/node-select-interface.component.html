@if (node) {
  <div class="context-menu" [style.left]="leftPosition" [style.top]="topPosition">
    <span [matMenuTriggerFor]="selectInterfaceMenu"></span>
    <mat-menu [style.min-height]="0" #selectInterfaceMenu="matMenu" panelClass="interface-menu-panel">
      @for (port of ports; track port.name) {
        <button mat-menu-item (click)="chooseInterface(port)" [disabled]="!port.available">
          <span class="interface-item">
            @if (port.available) {
              <svg class="status-icon" width="10" height="10">
                <rect x="0" y="0" width="10" height="10" fill="green"></rect>
              </svg>
            }
            @if (!port.available) {
              <svg class="status-icon" width="10" height="10">
                <rect x="0" y="0" width="10" height="10" fill="red"></rect>
              </svg>
            }
            <span class="port">{{ port.name }}</span>
          </span>
        </button>
      }
    </mat-menu>
  </div>
}
