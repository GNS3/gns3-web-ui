<h2 mat-dialog-title>Confirm {{ confirmActionData.actionType }} All</h2>
<mat-dialog-content>
  <p>Are you sure you want to {{ confirmActionData.actionType }} all devices?</p>
</mat-dialog-content>
<div style="display: flex; justify-content: flex-end; gap: 8px; padding: 16px;">
  <button mat-button (click)="onNoClick()">No</button>
  <button mat-button (click)="confirmAction()" cdkFocusInitial>Yes</button>
</div>
