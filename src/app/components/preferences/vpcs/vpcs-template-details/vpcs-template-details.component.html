<div class="content" [ngClass]="{ shadowed: isSymbolSelectionOpened }">
  <div class="default-header">
    <div class="row">
      <div class="col col-md-1">
        <button
          class="top-button"
          *ngIf="controller"
          class="cancel-button"
          mat-button
          (click)="goBack()"
        >
          <mat-icon>arrow_back</mat-icon>
        </button>
      </div>
      <div class="col col-md-11">
        <h1 class="col">VPCS node template configuration</h1>
      </div>
    </div>
  </div>
  <div class="default-content" *ngIf="vpcsTemplate">
    <mat-card class="matCard">
      <form [formGroup]="inputForm">
        <mat-form-field class="form-field">
          <input
            matInput
            type="text"
            formControlName="templateName"
            placeholder="Template name"
          />
        </mat-form-field>
        <mat-form-field class="form-field">
          <input
            matInput
            type="text"
            formControlName="defaultName"
            placeholder="Default name format"
          />
        </mat-form-field>
        <mat-form-field class="form-field">
          <input
            matInput
            type="text"
            formControlName="scriptFile"
            placeholder="Base script file"
          />
        </mat-form-field>
        <mat-form-field class="form-field">
          <input matInput type="text" formControlName="symbol" placeholder="Symbol" />
        </mat-form-field>
        <button mat-button class="symbolSelectionButton" (click)="chooseSymbol()">Choose symbol</button><br /><br />
        <mat-form-field class="form-field tags-field">
          <mat-label>Tags</mat-label>
          <mat-chip-grid #chipList>
            <mat-chip *ngFor="let tag of vpcsTemplate?.tags" (removed)="removeTag(tag)">
              {{ tag }}
              <mat-icon matChipRemove>cancel</mat-icon>
            </mat-chip>
          </mat-chip-grid>
          <input matInput placeholder="Add tags"
                 [matChipInputFor]="chipList"
                 [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
                 (matChipInputTokenEnd)="addTag($event)" />
        </mat-form-field>
        <mat-form-field class="form-field">
          <mat-select
            placeholder="Category"
            [ngModelOptions]="{ standalone: true }"
            [(ngModel)]="vpcsTemplate.category"
          >
            <mat-option *ngFor="let category of categories" [value]="category[1]">
              {{ category[0] }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field class="select">
          <mat-select
            placeholder="Console type"
            [ngModelOptions]="{ standalone: true }"
            [(ngModel)]="vpcsTemplate.console_type"
          >
            <mat-option *ngFor="let type of consoleTypes" [value]="type">
              {{ type }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-checkbox [ngModelOptions]="{ standalone: true }" [(ngModel)]="vpcsTemplate.console_auto_start">
          Auto start console
        </mat-checkbox>
      </form>
    </mat-card>
    <div class="buttons-bar">
      <button class="cancel-button" (click)="goBack()" mat-button>Cancel</button>
      <button mat-raised-button color="primary" (click)="onSave()">Save</button>
    </div>
  </div>
</div>
<app-symbols-menu
  *ngIf="isSymbolSelectionOpened && vpcsTemplate"
  [controller]="controller"
  [symbol]="vpcsTemplate.symbol"
  (symbolChangedEmitter)="symbolChanged($event)"
></app-symbols-menu>
