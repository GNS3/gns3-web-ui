<div class="docker-copy">
  <header class="docker-copy__header">
    @if (controller) {
      <button
        class="docker-copy__back-btn"
        (click)="goBack()"
        mat-icon-button>
        <mat-icon>arrow_back</mat-icon>
      </button>
    }
    <h1 class="docker-copy__title">Copy Docker container template</h1>
  </header>

  <main class="docker-copy__content">
    <section class="docker-copy__form-card">
      <form [formGroup]="templateNameForm" class="docker-copy__form">
        <mat-form-field appearance="fill" class="docker-copy__field">
          <mat-label>Template name</mat-label>
          <input matInput type="text" placeholder="Name" formControlName="templateName" />
        </mat-form-field>
      </form>
    </section>

    <div class="docker-copy__actions">
      <button mat-button class="docker-copy__cancel-btn" (click)="goBack()">Cancel</button>
      <button mat-raised-button color="primary" class="docker-copy__submit-btn" (click)="addTemplate()">Copy template</button>
    </div>
  </main>
</div>
