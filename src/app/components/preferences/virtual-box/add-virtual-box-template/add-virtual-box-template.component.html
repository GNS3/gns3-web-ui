<div class="content">
  <div class="default-header">
    <div class="row">
      <div class="col col-md-1">
        @if (controller) {
          <button
            class="top-button"
            class="cancel-button"
            mat-button
            (click)="goBack()"
          >
            <mat-icon>arrow_back</mat-icon>
          </button>
        }
      </div>
      <div class="col col-md-11">
        <h1 class="col">New VirtualBox VM template</h1>
      </div>
    </div>
  </div>
  @if (virtualBoxTemplate) {
    <div class="default-content">
    <mat-card class="matCard">
      <form [formGroup]="vmForm">
        <mat-form-field class="form-field">
          <mat-select placeholder="VM list" formControlName="vm">
            @for (vm of virtualMachines; track vm) {
              <mat-option [value]="vm">
                {{ vm.vmname }}
              </mat-option>
            }
          </mat-select>
        </mat-form-field>
      </form>
      <mat-checkbox [(ngModel)]="virtualBoxTemplate.linked_clone">
        Use as a linked base VM (experimental)
      </mat-checkbox>
    </mat-card>
    <div class="buttons-bar">
      <button mat-button class="cancel-button" (click)="goBack()">Cancel</button>
      <button mat-raised-button color="primary" (click)="addTemplate()">Add template</button>
    </div>
  </div>
  }
</div>
