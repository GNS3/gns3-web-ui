<div class="virtualbox-templates">
  <header class="virtualbox-templates__header">
    @if (controller) {
    <button
      class="virtualbox-templates__back-btn"
      [routerLink]="'/controller/' + controller.id + '/preferences'"
      mat-icon-button
    >
      <mat-icon>arrow_back</mat-icon>
    </button>
    }
    <h1 class="virtualbox-templates__title">VirtualBox VM templates</h1>
    @if (controller) {
    <button
      class="virtualbox-templates__add-btn"
      matTooltip="Add VirtualBox VM template"
      matTooltipClass="custom-tooltip"
      [routerLink]="'/controller/' + controller.id + '/preferences/virtualbox/addtemplate'"
      mat-icon-button
    >
      <mat-icon>add_circle_outline</mat-icon>
    </button>
    }
  </header>

  <main class="virtualbox-templates__content">
    @if (!virtualBoxTemplates.length) {
    <app-empty-templates-list></app-empty-templates-list>
    } @if (virtualBoxTemplates.length) {
    <nav class="virtualbox-templates__list">
      @for (template of virtualBoxTemplates; track template.template_id) {
      <div class="virtualbox-templates__list-item" [routerLink]="template.template_id">
        <mat-icon class="virtualbox-templates__list-icon">computer</mat-icon>
        <span class="virtualbox-templates__list-name">{{ template.name }}</span>
        <button
          mat-icon-button
          [matMenuTriggerFor]="menu"
          class="virtualbox-templates__menu-btn"
          (click)="$event.stopPropagation()"
        >
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu" xPosition="before">
          <a mat-menu-item [routerLink]="template.template_id">
            <mat-icon>edit</mat-icon>
            <span>Edit</span>
          </a>
          <button mat-menu-item (click)="deleteTemplate(template)">
            <mat-icon>delete</mat-icon>
            <span>Delete</span>
          </button>
        </mat-menu>
      </div>
      }
    </nav>
    }
  </main>
</div>
<app-delete-template #deleteComponent [controller]="controller" (deleteEvent)="onDeleteEvent()"></app-delete-template>
