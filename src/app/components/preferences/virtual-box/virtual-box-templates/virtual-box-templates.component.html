<div class="content">
  <div class="default-header">
    <div class="row">
      <div class="col col-md-1">
        @if (controller) {
          <button
            class="top-button"
            class="cancel-button"
            mat-button
            routerLink="/controller/{{ controller.id }}/preferences"
          >
            <mat-icon>arrow_back</mat-icon>
          </button>
        }
      </div>
      <div class="col col-md-10">
        <h1 class="col">VirtualBox VM templates</h1>
      </div>
      <div class="col col-md-1">
        @if (controller) {
          <button
            class="top-button cancel-button"
            matTooltip="Add Virtual Box VM template"
            matTooltipClass="custom-tooltip"
            routerLink="/controller/{{ controller.id }}/preferences/virtualbox/addtemplate"
            mat-button
          >
            <mat-icon>add_circle_outline</mat-icon>
          </button>
        }
      </div>
    </div>

  </div>
  @if (!virtualBoxTemplates.length) {
    <app-empty-templates-list></app-empty-templates-list>
  }
  @if (virtualBoxTemplates.length) {
    <div class="default-content">
      <div class="listcontainer mat-elevation-z8">
        <mat-nav-list>
          @for (template of virtualBoxTemplates; track template.template_id) {
            <div class="list-item">
              <mat-list-item class="template-name" routerLink="{{ template.template_id }}">{{
                template.name
              }}</mat-list-item>
              <button mat-button class="menu-button" [matMenuTriggerFor]="menu">
                <mat-icon>more_vert</mat-icon>
              </button>
              <mat-menu #menu="matMenu">
                <button mat-menu-item (click)="deleteTemplate(template)">
                  <mat-icon>delete</mat-icon><span>Delete</span>
                </button>
              </mat-menu>
            </div>
          }
        </mat-nav-list>
      </div>
    </div>
  }
</div>
<app-delete-template #deleteComponent [controller]="controller" (deleteEvent)="onDeleteEvent()"> </app-delete-template>
