<div class="udp-tunnels__input-grid">
  <mat-form-field>
    <mat-label>Name</mat-label>
    <input matInput type="text" [value]="newPortName()" (input)="newPortName.set($event.target.value)" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Remote host</mat-label>
    <input matInput type="text" [value]="newPortRhost()" (input)="newPortRhost.set($event.target.value)" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Local port</mat-label>
    <input matInput type="number" min="0" max="65535" [value]="newPortLport()" (input)="newPortLport.set(+$event.target.value)" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Remote port</mat-label>
    <input matInput type="number" min="0" max="65535" [value]="newPortRport()" (input)="newPortRport.set(+$event.target.value)" />
  </mat-form-field>
</div>
<div class="udp-tunnels__add-btn">
  <button mat-button (click)="onAddUdpInterface()">Add</button>
</div>

<table mat-table [dataSource]="dataSourceUdp">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let element">{{ element.name }}</td>
  </ng-container>

  <ng-container matColumnDef="lport">
    <th mat-header-cell *matHeaderCellDef>Local port</th>
    <td mat-cell *matCellDef="let element">{{ element.lport }}</td>
  </ng-container>

  <ng-container matColumnDef="rhost">
    <th mat-header-cell *matHeaderCellDef>Remote host</th>
    <td mat-cell *matCellDef="let element">{{ element.rhost }}</td>
  </ng-container>

  <ng-container matColumnDef="rport">
    <th mat-header-cell *matHeaderCellDef>Remote port</th>
    <td mat-cell *matCellDef="let element">{{ element.rport }}</td>
  </ng-container>

  <ng-container matColumnDef="action">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let element">
      <button mat-icon-button matTooltip="Delete port" matTooltipClass="custom-tooltip" (click)="delete(element)">
        <mat-icon aria-label="Delete port">delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
