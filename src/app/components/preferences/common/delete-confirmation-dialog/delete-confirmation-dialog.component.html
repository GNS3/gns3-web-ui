<h2 mat-dialog-title>Delete template</h2>
<div class="mat-mdc-dialog-content">Are you sure you want to delete template {{ templateName() }}?</div>
<div mat-dialog-actions>
  <button mat-button (click)="onNoClick()">No, cancel</button>
  <button mat-button (click)="onYesClick()" tabindex="2" mat-raised-button color="primary">
    Yes, delete!
  </button>
</div>
