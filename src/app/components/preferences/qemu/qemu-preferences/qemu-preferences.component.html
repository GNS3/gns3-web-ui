<div class="content">
  <div class="default-header">
    <div class="row">
      <h1 class="col">QEMU preferences</h1>
      @if (controller) {
      <button
        class="top-button"
        routerLink="/controller/{{ controller.id }}/preferences/qemu/templates"
        mat-raised-button
        color="primary"
      >
        QEMU VM templates
      </button>
      }
    </div>
  </div>
  <div class="default-content">
    <div class="container mat-elevation-z8">
      @if (settings) {
      <mat-nav-list>
        <mat-list-item>
          <mat-checkbox
            [checked]="settings.enable_hardware_acceleration"
            (change)="settings.enable_hardware_acceleration = $event.checked; cd.markForCheck()"
          >
            Enable Hardware Acceleration (KVM/HAXM)
          </mat-checkbox>
        </mat-list-item>
        @if (settings.enable_hardware_acceleration) {
        <mat-list-item>
          <mat-checkbox
            [checked]="settings.require_hardware_acceleration"
            (change)="settings.require_hardware_acceleration = $event.checked; cd.markForCheck()"
          >
            Require Hardware Acceleration (KVM/HAXM)
          </mat-checkbox>
        </mat-list-item>
        }
      </mat-nav-list>
      }
    </div>

    <div class="buttons-bar">
      <button mat-button color="accent" (click)="restoreDefaults()">Restore defaults</button>
      <button mat-raised-button color="primary" (click)="apply()">Apply</button>
    </div>
  </div>
</div>
