<div class="qemu-copy">
  <header class="qemu-copy__header">
    @if (controller) {
      <button
        class="qemu-copy__back-btn"
        (click)="goBack()"
        mat-icon-button>
        <mat-icon>arrow_back</mat-icon>
      </button>
    }
    <h1 class="qemu-copy__title">Copy QEMU VM template</h1>
  </header>

  <main class="qemu-copy__content">
    <section class="qemu-copy__form-card">
      <form [formGroup]="nameForm" class="qemu-copy__form">
        <mat-form-field appearance="fill" class="qemu-copy__field">
          <mat-label>Template name</mat-label>
          <input matInput type="text" placeholder="Name" formControlName="templateName" />
        </mat-form-field>
      </form>
    </section>

    <div class="qemu-copy__actions">
      <button mat-button class="qemu-copy__cancel-btn" (click)="goBack()">Cancel</button>
      <button mat-raised-button color="primary" class="qemu-copy__submit-btn" (click)="addTemplate()">
        Copy template
      </button>
    </div>
  </main>
</div>
