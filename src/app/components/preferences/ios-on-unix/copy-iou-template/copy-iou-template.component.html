<div class="iou-copy">
  <header class="iou-copy__header">
    @if (controller) {
    <button class="iou-copy__back-btn" (click)="goBack()" mat-icon-button>
      <mat-icon>arrow_back</mat-icon>
    </button>
    }
    <h1 class="iou-copy__title">Copy IOU device template</h1>
  </header>

  <main class="iou-copy__content">
    <section class="iou-copy__form-card">
      <form [formGroup]="templateNameForm" class="iou-copy__form">
        <mat-form-field appearance="fill" class="iou-copy__field">
          <mat-label>Template name</mat-label>
          <input matInput type="text" placeholder="Name" formControlName="templateName" />
        </mat-form-field>
      </form>
    </section>

    <div class="iou-copy__actions">
      <button mat-button class="iou-copy__cancel-btn" (click)="goBack()">Cancel</button>
      <button mat-raised-button color="primary" class="iou-copy__submit-btn" (click)="addTemplate()">
        Copy template
      </button>
    </div>
  </main>
</div>
