<div class="preferences">
  <header class="preferences__header">
    <button
      class="preferences__back-btn"
      routerLink="/controller/{{ controllerId }}/projects"
      mat-icon-button>
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1 class="preferences__title">Template preferences</h1>
  </header>

  <main class="preferences__content">
    <nav class="preferences__nav-list">
      <a mat-list-item routerLink="/controller/{{ controllerId }}/preferences/builtin" class="preferences__nav-item">
        <mat-icon class="preferences__nav-icon">settings</mat-icon>
        Built-in
      </a>
      <a mat-list-item routerLink="/controller/{{ controllerId }}/preferences/dynamips/templates" class="preferences__nav-item">
        <mat-icon class="preferences__nav-icon">router</mat-icon>
        Dynamips
      </a>
      <a mat-list-item routerLink="/controller/{{ controllerId }}/preferences/iou/templates" class="preferences__nav-item">
        <mat-icon class="preferences__nav-icon">keyboard</mat-icon>
        IOS on Unix
      </a>
      <a mat-list-item routerLink="/controller/{{ controllerId }}/preferences/vpcs/templates" class="preferences__nav-item">
        <mat-icon class="preferences__nav-icon">computer</mat-icon>
        VPCS
      </a>
      <a mat-list-item routerLink="/controller/{{ controllerId }}/preferences/qemu/templates" class="preferences__nav-item">
        <mat-icon class="preferences__nav-icon">memory</mat-icon>
        QEMU
      </a>
      <a mat-list-item routerLink="/controller/{{ controllerId }}/preferences/virtualbox/templates" class="preferences__nav-item">
        <mat-icon class="preferences__nav-icon">desktop_windows</mat-icon>
        VirtualBox
      </a>
      <a mat-list-item routerLink="/controller/{{ controllerId }}/preferences/vmware/templates" class="preferences__nav-item">
        <mat-icon class="preferences__nav-icon">devices</mat-icon>
        VMware
      </a>
      <a mat-list-item routerLink="/controller/{{ controllerId }}/preferences/docker/templates" class="preferences__nav-item">
        <mat-icon class="preferences__nav-icon">dns</mat-icon>
        Docker
      </a>
    </nav>
  </main>
</div>
