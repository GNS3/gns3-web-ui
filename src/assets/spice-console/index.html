<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="x-ua-compatible" content="IE=edge">
  <title>SPICE Console</title>
  <link rel="stylesheet" href="spice.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    #spice-screen {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #status-bar {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
      z-index: 1000;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    #status-bar.success {
      background: rgba(76, 175, 80, 0.9);
    }

    #status-bar.error {
      background: rgba(244, 67, 54, 0.9);
    }

    #status-bar.warning {
      background: rgba(255, 152, 0, 0.9);
    }

    #error-dialog {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      display: none;
      z-index: 1001;
    }

    #error-dialog h3 {
      color: #d32f2f;
      margin-bottom: 12px;
      font-size: 20px;
    }

    #error-dialog p {
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
      font-size: 14px;
    }

    #error-dialog .button-group {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    #error-dialog button {
      background: #1976d2;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    #error-dialog button:hover {
      background: #1565c0;
    }

    #error-dialog button.secondary {
      background: #f5f5f5;
      color: #333;
    }

    #error-dialog button.secondary:hover {
      background: #e0e0e0;
    }

    /* Loading indicator */
    .loading-spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #fff;
    }

    .loading-text {
      font-size: 16px;
      opacity: 0.8;
    }

    #spice-canvas-container {
      position: relative;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="spice-screen">
    <div class="loading-container" id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Initializing SPICE Console...</div>
    </div>
    <div id="spice-canvas-container"></div>
  </div>

  <div id="status-bar">Connecting...</div>

  <div id="error-dialog">
    <h3 id="error-title">Connection Failed</h3>
    <p id="error-message"></p>
    <div class="button-group">
      <button class="secondary" onclick="window.close()">Close</button>
      <button onclick="location.reload()">Retry</button>
    </div>
  </div>

  <!-- SPICE HTML5 Library Files -->
  <script src="spiceHTML5/spicearraybuffer.js"></script>
  <script src="spiceHTML5/enums.js"></script>
  <script src="spiceHTML5/atKeynames.js"></script>
  <script src="spiceHTML5/utils.js"></script>
  <script src="spiceHTML5/png.js"></script>
  <script src="spiceHTML5/lz.js"></script>
  <script src="spiceHTML5/quic.js"></script>
  <script src="spiceHTML5/bitmap.js"></script>
  <script src="spiceHTML5/spicedataview.js"></script>
  <script src="spiceHTML5/spicetype.js"></script>
  <script src="spiceHTML5/spicemsg.js"></script>
  <script src="spiceHTML5/wire.js"></script>
  <script src="spiceHTML5/spiceconn.js"></script>
  <script src="spiceHTML5/display.js"></script>
  <script src="spiceHTML5/port.js"></script>
  <script src="spiceHTML5/main.js"></script>
  <script src="spiceHTML5/inputs.js"></script>
  <script src="spiceHTML5/webm.js"></script>
  <script src="spiceHTML5/playback.js"></script>
  <script src="spiceHTML5/simulatecursor.js"></script>
  <script src="spice-controller.js"></script>
</body>
</html>
